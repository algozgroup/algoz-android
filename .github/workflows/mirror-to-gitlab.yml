name: Mirror to GitLab

# Auto-mirror this repository to its private GitLab backup on every push.
# Requires an org (or repo) secret: GITLAB_MIRROR_TOKEN = a GitLab token with write_repository scope.

on:
  push:
  workflow_dispatch:

concurrency:
  group: mirror-gitlab
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history + tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to GitLab
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_MIRROR_TOKEN }}
        run: |
          if [ -z "$GITLAB_TOKEN" ]; then
            echo "::error::GITLAB_MIRROR_TOKEN secret is not set."; exit 1
          fi
          git remote add gitlab "https://oauth2:${GITLAB_TOKEN}@gitlab.com/algozgroup-group/algoz-android-pub.git"
          git push gitlab "HEAD:refs/heads/${GITHUB_REF_NAME}" --force
          git push gitlab --tags --force
